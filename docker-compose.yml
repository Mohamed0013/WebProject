version: "3.9"

services:
  # ----------------- Laravel PHP App -----------------
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: laravel_app
    volumes:
      - ./backend:/var/www/html        # ✅ Laravel code mapped to /var/www/html
    depends_on:
      - mysql
    networks:
      - app
    working_dir: /var/www/html
    ports:
      - "9000:9000"                    # Optional if using PHP-FPM

  # ----------------- Nginx -----------------
  nginx:
    image: nginx:latest
    container_name: nginx_server
    ports:
      - "8000:80"                      # Access Laravel at localhost:8000
    volumes:
      - ./backend:/var/www/html        # Laravel code
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - app

  # ----------------- MySQL -----------------
  mysql:
    image: mysql:8.0
    container_name: mysql_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: house_market
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: laravel
      MYSQL_PASSWORD: laravel
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app

  # ----------------- React Node App -----------------
  node:
    image: node:20
    container_name: react_app
    working_dir: /app
    volumes:
      - ./frontend:/app                 # React frontend code
    ports:
      - "5173:5173"                     # Vite dev server
    command: tail -f /dev/null
    networks:
      - app

networks:
  app:

volumes:
  db_data: